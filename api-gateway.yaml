server:
  port: 8080

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.cloud.loadbalancer: TRACE

spring:
  cloud:
    gateway:
      routes:
        - id: cliente-route
          uri: lb://CLIENTE-SERVICE
          predicates:
            - Path=/api/v1/clientes, /api/v1/clientes/**
        - id: paquete-route
          uri: lb://PAQUETE-SERVICE
          predicates:
            - Path=/api/v1/paquetes, /api/v1/paquetes/**, /api/v1/categorias, /api/v1/categorias/**
        - id: tracking-route
          uri: lb://TRACKING-SERVICE
          predicates:
            - Path=/api/v1/tracking, /api/v1/tracking/**
        - id: security-route
          uri: lb://SECURITY-SERVICE
          predicates:
            - Path=/api/v1/auth, /api/v1/auth/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/